name: Kubernetes CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Kubernetes Cluster
        run: kubectl get nodes

      - name: Validate deployment.yaml
        run: kubectl apply --dry-run=client --validate=false -f deployment.yaml

      - name: Validate service.yaml
        run: kubectl apply --dry-run=client --validate=false -f service.yaml

      - name: Deploy to Minikube
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get svc
          
